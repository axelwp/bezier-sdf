name: Deploy react example to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @bezier-sdf/core build
      - run: pnpm --filter @bezier-sdf/react build
      - run: pnpm --filter @bezier-sdf/example-react build

      - name: Push build to axelwp.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          external_repository: axelwp/axelwp.github.io
          publish_branch: main
          publish_dir: ./examples/react/dist
          force_orphan: true
          commit_message: "deploy from bezier-sdf@${{ github.sha }}"